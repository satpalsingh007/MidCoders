services:
  - type: web
    runtime: static
    name: midcoders
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Send every URL to index.html so React Router can handle client-side
      # routing (fixes "Page not found" on direct visits / refreshes of
      # /solutions, /about, /blog, /blog/blog-ai, etc.).
      - type: rewrite
        source: /*
        destination: /index.html
